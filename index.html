    function standardizeAbbr(abbr) { let u=abbr?.toUpperCase().trim()||""; const map={WAS:"WSH",CHW:"CWS"}; return map[u]||u; }
    function windDegToDir(deg){ if(deg==null) return "N/A"; const dirs=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"]; return dirs[Math.floor(deg/22.5+0.5)%16];}
    function weatherShort(wx){ if(!wx) return "N/A"; return `${wx.temp}°F, Wind ${wx.windSpeed} mph ${wx.windDir}`; }
    function compassToDegrees(c){ const m={N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5}; return m[c?.toUpperCase()]||0; }

    function nameMatches(n1,n2){ if(!n1||!n2) return false; let a=normalizeName(n1),b=normalizeName(n2); if(a===b) return true; let p1=a.split(" "),p2=b.split(" "); if(p1.length>1 && p2.length>1 && p1[p1.length-1]===p2[p2.length-1] && p1[0][0]===p2[0][0]) return true; return false; }
    function getStabilizedHr9(hr9Raw, ip){ let hr9=parseFloat(hr9Raw)||1.2; let innings=parseFloat(ip); if(isNaN(innings)||innings<=0) return 1.2; return (hr9*innings+1.2*30)/(innings+30); }
    function stabilizeStatcastProps(st){ let ev=st?.ev||89, barrel=st?.barrel||6.5, la=st?.la||14, hh=st?.hh||38, ss=st?.ss||33, pull=st?.pull||40, bbe=st?.bbe||0; let w=Math.min(1, bbe/50); return { ev:ev*w+89*(1-w), barrel:barrel*w+6.5*(1-w), la:la*w+14*(1-w), hh:hh*w+38*(1-w), ss:ss*w+33*(1-w), pull:pull*w+40*(1-w), isFallback:!st?.ev }; }
    function calcHRProb(barrel,hh,ss,pull,hr9,goao,ip,pf,temp,windDir,windSpeed,isLive,platoonAdv){
        let windDeg=compassToDegrees(windDir);
        let bearing=parkBearings[pf]||0;
        let wC=(windSpeed||0)*Math.cos(((windDeg+180-bearing)*Math.PI)/180)*0.015;
        let stHR9=(hr9*ip+1.2*30)/(ip+30);
        let stGOAO=(goao*ip+1.1*30)/(ip+30);
        let batter_z=Math.log(Math.max(0.5,barrel)/7)*0.7+Math.log(Math.max(20,hh)/38)*0.5+Math.log(Math.max(20,ss)/33)*0.3+Math.log(Math.max(20,pull)/40)*0.4;
        let pitcher_z=Math.log(stHR9/1.15)*0.4+Math.log(1.1/Math.max(0.5,stGOAO))*0.6;
        let wind_z=Math.min(Math.max(wC,-0.4),0.4);
        let env_z=0.5*Math.log(pf/100)+0.007*(temp-70)+wind_z;
        let platoon_z=platoonAdv?0.08:-0.08;
        let z=-3.75+batter_z+pitcher_z+env_z+platoon_z;
        let p_pa=Math.max(0.001,Math.min(0.25,1/(1+Math.exp(-z))));
        let prob=1-Math.pow(1-p_pa,isLive?2.5:4.1);
        let score=Math.round(30+Math.log(prob/0.01)*20+(isLive?8:0));
        return {prob,score:Math.min(105,Math.max(10,score))};
    }

            let today=new Date(); let offset=-4; let localDate=new Date(today.getTime()+(-4*60-today.getTimezoneOffset())*60000);

                let pitchers=pitcherIdMap[gameKey]||{};
                let homePitcher=pitchers.home, awayPitcher=pitchers.away;
                let homePitcherHr9=homePitcher?.id&&pitcherStatsMap[homePitcher.id]?pitcherStatsMap[homePitcher.id].hr9:"—";
                let awayPitcherHr9=awayPitcher?.id&&pitcherStatsMap[awayPitcher.id]?pitcherStatsMap[awayPitcher.id].hr9:"—";
                let gd=gameData[gameKey]||{};
                let rowsHtml="";
                for(let [playerName,info] of Object.entries(gd)){
                    let pid=nameToMlbId[playerName.toLowerCase()];
                    if(!pid) continue;
                    let st=stabilizeStatcastProps(statcastMap[pid]||{});
                    let oppPitcherId=info.team===hA?awayPitcher?.id:homePitcher?.id;
                    let oppStats=oppPitcherId?pitcherStatsMap[oppPitcherId]:null;
                    let hr9Raw=oppStats?.hr9||1.2, goaoRaw=oppStats?.goao||1.1, ip=oppStats?.ip||0;
                    let ph=getStabilizedHr9(hr9Raw,ip);
                    let pitcherName=info.team===hA?awayPitcher?.name:homePitcher?.name;
                    let platoonAdv=((playerPhysicalCache[pid]?.stand||"R")!=="R") || true;
                    let {prob,score}=calcHRProb(st.barrel,st.hh,st.ss,st.pull,hr9Raw,goaoRaw,ip,pf,wx.temp,wx.windDir,wx.windSpeed,isLive,platoonAdv);
                    let bestOddsObj=info.books.reduce((a,b)=>a.odds>b.odds?a:b,{odds:0});
                    let oddsVal=bestOddsObj.odds;
                    let implied=oddsVal>0?100/(oddsVal+100):Math.abs(oddsVal)/(Math.abs(oddsVal)+100);
                    let edge=(prob-implied)*100;
                    let oddsStr=oddsVal?`${oddsVal>0?"+":""}${oddsVal}`:"—";
                    let fallbackTag=!statcastMap[pid]?.ev?"⚠️ AVG":(statcastMap[pid]?.bbe<30?"⚠️ PARTIAL":"");
                    allTargets.push({player:playerName,team:info.team,score,prob,edge,odds:oddsStr,brl:st.barrel.toFixed(1),hh:st.hh.toFixed(1),pull:st.pull.toFixed(1),hr9:ph.toFixed(2),live:isLive,fallback:fallbackTag});
                    rowsHtml+=`<tr class="player-row"><td><span class="highlight-yellow">${playerName}</span> ${fallbackTag&&`<span class="warning-badge">${fallbackTag}</span>`}</td><td>${score}/105</td><td>${(prob*100).toFixed(1)}%</td><td>${edge>0?`<span class="highlight-blue">+${edge.toFixed(1)}%</span>`:`${edge.toFixed(1)}%`}</td><td>${oddsStr}</td><td>Brl:${st.barrel.toFixed(1)}% | HH:${st.hh.toFixed(1)}%</td><td>${pitcherName||"TBD"}<br><span class="badge">HR/9 ${ph.toFixed(2)}</span></td><td>${weatherShort(wx)}</td></tr>`;
                }
                let gameStatus=`${isLive?"⚡ LIVE":(isFinal?"✅ FINAL":"📋 PREVIEW")} ${g.status.detailedState||""}`;
                gamesHtml+=`<div class="game-cluster glass-panel"><div class="game-header"><div><strong>${aA} @ ${hA}</strong> <span class="game-status">${gameStatus}</span></div><div class="weather-info">🌡️ ${weatherShort(wx)} | PF: ${pf}</div></div><div class="pitcher-line">🧢 SP: ${awayPitcher?.name||"TBD"} (HR/9 ${awayPitcherHr9})  |  🧢 ${homePitcher?.name||"TBD"} (HR/9 ${homePitcherHr9})</div>${rowsHtml?`<table><thead><tr><th>Batter</th><th>Model</th><th>HR Prob</th><th>Edge</th><th>Best DK</th><th>Statcast</th><th>Opp Pitcher</th><th>Weather</th></tr></thead><tbody>${rowsHtml}</tbody></table>`:`<div style="padding:1rem; text-align:center;">⚠️ No DraftKings HR lines available</div>`}</div>`;
            }
            let sortedScore=[...allTargets].sort((a,b)=>b.score-a.score).slice(0,10);
            let sortedEdge=[...allTargets].filter(t=>t.edge>0).sort((a,b)=>b.edge-a.edge).slice(0,8);
            root.innerHTML=`
                <div class="top-grid">
                    <div class="leader-card glass-panel"><div class="section-title"><i>🔥</i> TOP 10 HR TARGETS (Model)</div><table><thead><tr><th>Player (Team)</th><th>Score</th><th>Prob</th><th>Edge</th><th>Odds</th></tr></thead><tbody>${sortedScore.map(p=>`<tr><td>${p.player} ${p.live?"⚡":""} <span class="badge">${p.team}</span> ${p.fallback}</td><td class="highlight-blue">${p.score}</td><td>${(p.prob*100).toFixed(1)}%</td><td class="${p.edge>0?'highlight-yellow':''}">${p.edge>0?"+"}${p.edge.toFixed(1)}%</td><td>${p.odds}</td></tr>`).join("")}</tbody></table></div>
                    <div class="leader-card glass-panel"><div class="section-title"><i>💰</i> TOP +EV BETS</div><table><thead><tr><th>Player</th><th>Model Prob</th><th>Edge %</th><th>Odds</th></tr></thead><tbody>${sortedEdge.map(p=>`<tr><td>${p.player} (${p.team})</td><td>${(p.prob*100).toFixed(1)}%</td><td class="highlight-yellow">+${p.edge.toFixed(1)}%</td><td>${p.odds}</td></tr>`).join("")}</tbody></table></div>
                </div>
                ${gamesHtml}
                <div class="footer-diagnostic">⚙️ ENGINE v50 | Statcast ${scYear} | weather via OpenWeather | ${games.length} games | Targets: ${allTargets.length} | ${new Date().toLocaleString()}</div>
            `;
            document.getElementById("lastUpdateBadge").innerHTML=`✅ LIVE DATA • ${games.length} games • ${new Date().toLocaleString()}`;
        }catch(err){
            console.error(err);
            root.innerHTML=`<div class="glass-panel" style="color:#ff9977;">⚠️ ERROR: ${err.message}<br>Check console or network (CORS might block some APIs). Refresh or try again later.</div>`;
        }
    })();
</script>
</body>
</html>
