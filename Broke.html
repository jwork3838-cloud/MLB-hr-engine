<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MLB HR Engine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--surface:#111019;--surface2:#18172a;
  --border:#252340;--accent:#c8f542;--dim:#5a5878;
  --text:#e4e2f0;--red:#ff6b6b;--blue:#a0a0ff;--orange:#ff9944;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;
  height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-title{color:var(--accent);font-size:15px;font-weight:700;letter-spacing:.05em}
.hdr-sub{font-size:9px;color:var(--dim);letter-spacing:.15em;margin-top:2px}
.hdr-btn{background:var(--surface2);color:var(--dim);border:1px solid var(--border);
  border-radius:6px;padding:7px 11px;font-family:'Courier New',monospace;
  font-size:10px;cursor:pointer}

/* ── SETUP SCREEN ── */
#setup{flex:1;overflow-y:auto;padding:20px 16px 40px}
.card{background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:16px;margin-bottom:14px}
.lbl{display:block;font-size:9px;letter-spacing:.2em;color:var(--dim);
  text-transform:uppercase;margin-bottom:8px}
input[type=password],input[type=text]{width:100%;background:var(--bg);
  border:1px solid #332f50;border-radius:6px;color:var(--text);
  font-family:'Courier New',monospace;font-size:13px;padding:10px 12px;
  outline:none;-webkit-appearance:none}
input:focus{border-color:var(--accent)}
.btn{display:block;width:100%;background:var(--accent);color:var(--bg);
  border:none;border-radius:6px;padding:12px;font-family:'Courier New',monospace;
  font-weight:700;font-size:12px;letter-spacing:.05em;cursor:pointer;margin-top:10px}
.btn:disabled{opacity:.35;pointer-events:none}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.err{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);
  border-radius:6px;color:var(--red);padding:9px 13px;font-size:11px;margin-top:10px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.pill{border:1px solid var(--border);border-radius:6px;padding:8px 13px;
  font-size:11px;color:var(--dim);cursor:pointer;background:var(--surface);
  -webkit-tap-highlight-color:transparent;transition:all .12s}
.pill.on{border-color:var(--accent);color:var(--accent);background:rgba(200,245,66,.07)}
.note{font-size:10px;color:var(--dim);margin-top:8px;line-height:1.5}
a{color:var(--accent)}

/* ── CHAT SCREEN ── */
#chat{flex:1;display:flex;flex-direction:column;min-height:0}
.msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:88%;border-radius:10px;padding:10px 13px;font-size:12px;line-height:1.55;
  white-space:pre-wrap;word-break:break-word}
.msg.user{align-self:flex-end;background:#1e1c3a;color:var(--text);
  border-bottom-right-radius:3px}
.msg.ai{align-self:flex-start;background:var(--surface);color:var(--text);
  border-bottom-left-radius:3px;border:1px solid var(--border)}
.msg.system{align-self:center;background:rgba(200,245,66,.06);
  border:1px solid rgba(200,245,66,.15);color:var(--accent);font-size:10px;
  letter-spacing:.05em;text-align:center;padding:6px 14px;max-width:95%}
.msg.tool{align-self:flex-start;background:rgba(160,160,255,.06);
  border:1px solid rgba(160,160,255,.15);color:var(--blue);font-size:10px;
  max-width:95%;padding:7px 12px}
.msg.err-msg{align-self:flex-start;background:rgba(255,107,107,.07);
  border:1px solid rgba(255,107,107,.2);color:var(--red);font-size:11px}
.typing{display:flex;gap:5px;align-items:center;padding:4px 0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--dim);
  animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.3s}
.dot:nth-child(3){animation-delay:.6s}
@keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}

.input-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);
  flex-shrink:0;background:var(--bg)}
.input-row textarea{flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Courier New',monospace;
  font-size:13px;padding:10px 12px;outline:none;resize:none;
  max-height:100px;min-height:42px;-webkit-appearance:none}
.input-row textarea:focus{border-color:var(--accent)}
.send-btn{background:var(--accent);color:var(--bg);border:none;border-radius:8px;
  width:42px;flex-shrink:0;font-size:18px;cursor:pointer;align-self:flex-end}
.send-btn:disabled{opacity:.3;pointer-events:none}
.phase-bar{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.phase-chip{white-space:nowrap;font-size:9px;letter-spacing:.1em;padding:5px 10px;
  border-radius:20px;border:1px solid var(--border);color:var(--dim);cursor:pointer;
  background:var(--surface);-webkit-tap-highlight-color:transparent}
.phase-chip.active{border-color:var(--accent);color:var(--accent);
  background:rgba(200,245,66,.08)}

/* ── TABLE RENDERING ── */
.tbl-wrap{overflow-x:auto;max-width:100%;margin-top:6px}
table{border-collapse:collapse;font-size:10px;min-width:500px}
th{background:#1a192e;color:var(--accent);padding:6px 10px;text-align:left;
  font-weight:700;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:5px 10px;border-bottom:1px solid #1a192a;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#111019}

#setup{display:none}
#chat{display:none}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="hdr-title">⚾ MLB HR ENGINE</div>
    <div class="hdr-sub">GEMINI · THE ODDS API · STATCAST</div>
  </div>
  <button class="hdr-btn" id="settings-btn" onclick="toggleSettings()">⚙ KEYS</button>
</div>

<!-- SETUP SCREEN -->
<div id="setup">
  <div class="card">
    <span class="lbl">Gemini API Key</span>
    <p class="note" style="margin-bottom:10px">Get free at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></p>
    <input type="password" id="gemini-key" placeholder="AIza…" autocomplete="off">
  </div>
  <div class="card">
    <span class="lbl">The Odds API Key</span>
    <p class="note" style="margin-bottom:10px">Free at <a href="https://the-odds-api.com" target="_blank">the-odds-api.com</a> — 500 req/month</p>
    <input type="password" id="odds-key" placeholder="Paste key…" autocomplete="off">
  </div>
  <div class="card">
    <span class="lbl">Minimum HR Prop Odds</span>
    <div class="pills" id="thresh-pills"></div>

  <div id="setup-err" class="err" style="display:none"></div>
  <p class="note" style="margin-top:16px;text-align:center">Keys stored locally on this device only.</p>
</div>

<!-- CHAT SCREEN -->
<div id="chat">
  <div class="phase-bar" id="phase-bar"></div>
  <div class="msgs" id="msgs"></div>
  <div class="input-row">
    <textarea id="user-input" placeholder="Type command or message…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
// ── SYSTEM PROMPT ────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `SYSTEM IDENTITY AND CORE MANDATE

You are a stateless, deterministic data-extraction and analytical engine. Your sole directive is the identification, validation, ranked synthesis of high-yield MLB home run prop bets with odds at or above +700, restricted exclusively to confirmed starting lineup positions 6 through 9, followed by the construction of the three highest-composite-value parlay combinations from all survivors. You operate under a strict sequential gating protocol with zero tolerance for deviation. Every phase requires explicit user authorization before execution.

You have access to two tools:
1. fetch_mlb_events — retrieves today's MLB game schedule
2. fetch_hr_odds — retrieves live HR prop odds for a specific game event ID

Use these tools automatically whenever you need live odds data. Do not ask the user to fetch odds manually. When you need odds for a player, call fetch_hr_odds with the correct event_id. You may call these tools multiple times.

IMMUTABLE NEGATIVE CONSTRAINTS

TARGETING LOCK: Processing any batter in lineup positions 1 through 5, any pinch hitter, any player with unconfirmed lineup status, or any player with a confirmed DNP or scratch is a fatal protocol violation. Terminate that entity's evaluation immediately upon detection.

ANTI-HALLUCINATION ENFORCEMENT: Inferring, interpolating, or synthesizing any metric not directly retrieved from a live source is a fatal error. If a metric is unavailable after exhausting the Fallback Protocol, apply the mandatory tag [DATA NULL]. No exceptions.

ANTI-PREDICTIVE-CACHING: Do not apply pre-trained priors, historical base rates, or pattern-matching heuristics to estimate any quantitative value including odds, Brl%, EV, LA, VAA, or any proxy thereof.

LEXICAL PROHIBITION: The following strings are permanently forbidden: "I cannot," "I am unable," "please note," "keep in mind," "disclaimer," "it's important to," "as an AI," "I should mention," or any equivalent hedge phrase. All output is declarative and data-native only.

PHASE ISOLATION: No phase may pre-execute, speculate about, or reference the output of a phase not yet triggered. Phase gates are hard walls.

NULL AND STALE DATA TAXONOMY

[NO PROP OFFERED] — No HR prop offered by any targeted book.
[BELOW THRESHOLD] — Prop found but odds below threshold at all targeted books.
[DATA NULL] — Metric unretrievable after 3 Boolean attempts.
[STALE] — Odds timestamp verified more than 2 hours before query time.
[LINEUP UNCONFIRMED] — Lineup position unconfirmed at time of query.
[SCRATCHED - PURGE] — Player confirmed scratched or DNP post-lineup release.
[PENDING USER GATE] — Entity flagged for user decision due to data null accumulation.

PURGE RULE: Any entity accumulating [DATA NULL] on more than one Statcast metric is tagged [PENDING USER GATE] and a user gate is surfaced. No autonomous purge permitted.

USER GATE PROTOCOL

TRIGGER: Any Phase 2 entity reaches [DATA NULL] count of 2 or more.

Gate block format:
[USER GATE — DATA INSUFFICIENCY DETECTED]
Entity: [Player Name] | Team: [Team] | Lineup: [Pos] | Odds: [+XXX] via [Book]
NULL METRICS: [list]
AVAILABLE METRICS: [list]
SELECT: RETRY [Name] / PROCEED [Name] / PURGE [Name]

METRICS SPECIFICATION

BATTER (Baseball Savant / Statcast, current season):
1. Brl% — Barrel Percentage (%)
2. Avg EV — Average Exit Velocity (MPH, plausible 70-120)
3. Avg LA — Average Launch Angle (degrees, plausible -20 to +40)

PITCHER (Statcast, handedness-split mandatory):
4. VAA — Vertical Approach Angle of primary fastball (degrees, LHB vs RHB split)
   If unavailable, all three proxies mandatory:
   4a. Release Height (ft)
   4b. Release Extension (ft)
   4c. Fastball Spin Rate (RPM)

BIOMECHANICAL ALIGNMENT: Delta = |Batter Avg LA minus (-1 x Pitcher VAA)|
Render [N/A] if either input is null.

COMPOSITE SCORE (Phase 4 use, inside thinking only):
Base = Brl% x 0.5 + (Avg EV - 88) x 0.3 + (10 - |Avg LA - 25|) x 0.2
Null Penalty Factor: 1.0 (no nulls) or 0.85 (any USER NULL ACK leg)

SPORTSBOOK TARGETING

Priority order: DraftKings, FanDuel, BetMGM, Caesars, ESPN Bet.
Record single highest odds across all books. Ties resolved by earlier timestamp.
Confirm prop type is "To Hit a Home Run" anytime HR only. Reject [PROP TYPE MISMATCH] if unconfirmed.
Odds in American format. Append [STALE] if timestamp older than 2 hours.

AMERICAN ODDS CONVERSION FOR PARLAY:
Decimal = (American / 100) + 1 for positive odds.
Combined American = (product of all decimals - 1) x 100, rounded, with + prefix.

FALLBACK PROTOCOL

Attempt 1: site:baseballsavant.mlb.com "[First Last]" "[Metric]" [year]
Attempt 2: site:baseballsavant.mlb.com "[First Last]" "[Metric]"
Attempt 3: "[First Last]" "[Metric]" "[year]" site:fangraphs.com OR site:baseball-reference.com
If all 3 fail: apply [DATA NULL]. Log attempts in thinking tags.

EXECUTION PHASES

TRIGGER SYNTAX: "PROCEED TO PHASE [N]"
Deviation returns: [TRIGGER SYNTAX INVALID — AWAITING CORRECT COMMAND]

PHASE 0 — PARAMETER INITIALIZATION
1. Lock current date, time, timezone.
2. Call fetch_mlb_events to retrieve today's game slate.
3. Identify games with lineups eligible for release.
4. Construct Boolean search strings for Phase 1.
DoD: Timestamp locked. Full slate identified. Boolean strings logged in thinking. Zero metrics extracted.
Output: Plain numbered list.
END: [PHASE 0 COMPLETE — AWAITING USER COMMAND]

PHASE 1 — LINEUP TARGETING AND ODDS CALIBRATION
1. Search confirmed starting lineups for all Phase 0 games.
2. Extract only batting order positions 6, 7, 8, 9.
3. For each extracted player, call fetch_hr_odds with the game's event_id to retrieve anytime HR prop odds. You MUST call fetch_hr_odds for every game — do not skip this tool call.
4. Apply all null and stale tags per taxonomy.
5. Retain only entities with confirmed odds at or above the configured threshold.
DoD: All games queried. Only positions 6-9 in output. Every entity has odds or authorized null tag. Below-threshold labeled and excluded.
Output format: [GAME: Team A vs Team B | First Pitch: HH:MM TZ]
Player Name | Pos: [6/7/8/9] | Bats: [L/R/S] | Max Odds: [+XXX or TAG] | Book: [Name] | Timestamp: [HH:MM TZ]
END: [PHASE 1 COMPLETE — AWAITING USER COMMAND]

PHASE 2 — STATCAST EXTRACTION AND CROSS-REFERENCING
1. For every Phase 1 entity with odds at threshold or above, retrieve Brl%, Avg EV, Avg LA, pitcher VAA or full proxy set using web search and Fallback Protocol.
2. Apply null tags. Log all Boolean attempts in thinking tags.
3. Evaluate DATA NULL count per entity. Gate entities at 2 or more nulls.
4. Execute Biomechanical Alignment calculation for ungated entities.
5. Calculate Composite Score in thinking tags only.
6. Re-verify odds validity.
DoD: All entities processed. No autonomous purges. Deltas calculated or documented. Scores logged in thinking. Odds re-validated.
Output format: [VALIDATED TARGET] block per entity plus [PURGE LOG].
END: [PHASE 2 COMPLETE — AWAITING USER COMMAND]

PHASE 3 — FINAL SYNTHESIS
Compile all Phase 2 survivors into a single Markdown table sorted by Max Live Odds descending.
Zero surrounding prose. All units inline. Null cells as [DATA NULL]. Never blank.
Column order: Player | Team | Lineup Pos | Opp Pitcher (VAA or Proxy) | Brl% | Avg EV (MPH) | Avg LA (degrees) | LA-VAA Delta (degrees) | Max Live Odds | Book
If zero survivors: [NULL RESULT SET — NO TARGETS MET ALL CRITERIA]
END: [PHASE 3 COMPLETE — AWAITING USER COMMAND]

PHASE 4 — PARLAY SYNTHESIS
PARLAY CORRELATION PROHIBITION: No combination may contain two players from the same game.
1. Assemble survivor pool. Purged entities ineligible.
2. Discard same-game combinations.
3. Generate all valid 2-leg and 3-leg combinations.
4. Score by Parlay Composite Score (average individual scores x Null Penalty Factor).
5. Select top 3 by score. Calculate combined American odds.
6. Validate no leg carries [STALE] at execution time.
Output: Three Markdown tables labeled PARLAY 1 (BEST), PARLAY 2, PARLAY 3.
Each table schema: Rank | Player | Team | Lineup Pos | Max Live Odds | Stale Flag
Below each table: COMBINED ODDS: [+XXXXX] (calculation shown)
If fewer than 2 survivors: [PARLAY POOL INSUFFICIENT — MINIMUM 2 SURVIVORS REQUIRED]
END: [ANALYSIS COMPLETE — SESSION TERMINATED]`;

// ── FUNCTION TOOL DEFINITIONS ────────────────────────────────────────────────
const TOOLS = [{
  functionDeclarations:[{
    name:"fetch_mlb_events",
    description:"Retrieve today's MLB game schedule including event IDs and start times.",
    parameters:{type:"OBJECT",properties:{},required:[]}
  },{
    name:"fetch_hr_odds",
    description:"Fetch live MLB home run prop odds from DraftKings, FanDuel, BetMGM, Caesars, and ESPN Bet for a specific game.",
    parameters:{type:"OBJECT",
      properties:{
        event_id:{type:"STRING",description:"The Odds API event ID for the MLB game"},
        game_label:{type:"STRING",description:"Human-readable game label e.g. Yankees vs Red Sox"}
      },
      required:["event_id","game_label"]
    }
  }]
}];

// ── STATE ────────────────────────────────────────────────────────────────────
let geminiKey="", oddsKey="", threshold=700;
let history=[];
let isLoading=false;
let mlbEventCache=null;

const BOOKS=["draftkings","fanduel","betmgm","caesars","espnbet"];
const BOOK_LABELS={draftkings:"DraftKings",fanduel:"FanDuel",betmgm:"BetMGM",caesars:"Caesars",espnbet:"ESPN Bet"};
const ODDS_BASE="https://api.the-odds-api.com/v4";
const GEMINI_BASE="https://generativelanguage.googleapis.com/v1beta";
const MODEL="gemini-2.5-pro-preview-06-05";

// ── INIT ─────────────────────────────────────────────────────────────────────
(function init(){
  geminiKey=localStorage.getItem("mlb_gemini_key")||"";
  oddsKey=localStorage.getItem("mlb_odds_key")||"";
  threshold=parseInt(localStorage.getItem("mlb_threshold")||"700");

  buildThreshPills();

  if(geminiKey&&oddsKey){
    showChat();
  } else {
    document.getElementById("setup").style.display="block";
    if(geminiKey) document.getElementById("gemini-key").value=geminiKey;
    if(oddsKey) document.getElementById("odds-key").value=oddsKey;
  }
})();

function buildThreshPills(){
  const c=document.getElementById("thresh-pills");
  [700,800,900,1000].forEach(v=>{
    const d=document.createElement("div");
    d.className="pill"+(v===threshold?" on":"");
    d.textContent="+"+v;
    d.onclick=()=>{threshold=v;c.querySelectorAll(".pill").forEach(p=>p.classList.remove("on"));d.classList.add("on");};
    c.appendChild(d);
  });
}

function saveSetup(){
  const gk=document.getElementById("gemini-key").value.trim();
  const ok=document.getElementById("odds-key").value.trim();
  if(!gk||!ok){showErr("setup-err","Both API keys are required.");return;}
  geminiKey=gk; oddsKey=ok;
  localStorage.setItem("mlb_gemini_key",gk);
  localStorage.setItem("mlb_odds_key",ok);
  localStorage.setItem("mlb_threshold",threshold);
  showChat();
}

function toggleSettings(){
  const s=document.getElementById("setup");
  const c=document.getElementById("chat");
  if(s.style.display==="none"||!s.style.display){
    s.style.display="block"; c.style.display="none";
    document.getElementById("gemini-key").value=geminiKey;
    document.getElementById("odds-key").value=oddsKey;
  } else {
    showChat();
  }
}

function showChat(){
  document.getElementById("setup").style.display="none";
  document.getElementById("chat").style.display="flex";
  buildPhaseBar();
  if(!history.length) addSysMsg("ENGINE READY — Type: PROCEED TO PHASE 0");
}

function showErr(id,msg){
  const e=document.getElementById(id);
  e.textContent=msg; e.style.display="block";
}

// ── PHASE BAR ────────────────────────────────────────────────────────────────
const PHASES=["PHASE 0","PHASE 1","PHASE 2","PHASE 3","PHASE 4"];
let currentPhase=-1;

function buildPhaseBar(){
  const bar=document.getElementById("phase-bar");
  bar.innerHTML="";
  PHASES.forEach((p,i)=>{
    const chip=document.createElement("div");
    chip.className="phase-chip"+(i===currentPhase?" active":"");
    chip.id="phase-chip-"+i;
    chip.textContent=p;
    chip.onclick=()=>insertPhaseCmd(i);
    bar.appendChild(chip);
  });
}

function insertPhaseCmd(i){
  const ta=document.getElementById("user-input");
  ta.value="PROCEED TO PHASE "+i;
  autoResize(ta);
  ta.focus();
}

function setPhase(n){
  currentPhase=n;
  document.querySelectorAll(".phase-chip").forEach((c,i)=>{
    c.classList.toggle("active",i===n);
  });
}

// ── MESSAGES ─────────────────────────────────────────────────────────────────
function addSysMsg(text){
  const div=document.createElement("div");
  div.className="msg system"; div.textContent=text;
  document.getElementById("msgs").appendChild(div);
  scrollBottom();
}

function addMsg(role,content){
  const div=document.createElement("div");
  div.className="msg "+role;
  // render markdown tables
  div.innerHTML=renderMarkdown(content);
  document.getElementById("msgs").appendChild(div);
  scrollBottom();
  return div;
}

function addToolMsg(name,summary){
  const div=document.createElement("div");
  div.className="msg tool";
  div.textContent="⚡ TOOL: "+name+" — "+summary;
  document.getElementById("msgs").appendChild(div);
  scrollBottom();
}

function showTyping(){
  const div=document.createElement("div");
  div.className="msg ai"; div.id="typing-indicator";
  div.innerHTML='<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  document.getElementById("msgs").appendChild(div);
  scrollBottom();
  return div;
}

function removeTyping(){
  const t=document.getElementById("typing-indicator");
  if(t) t.remove();
}

function scrollBottom(){
  const m=document.getElementById("msgs");
  m.scrollTop=m.scrollHeight;
}

function renderMarkdown(text){
  // Escape HTML first
  let h=text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // Tables
  h=h.replace(/^\|(.+)\|$/gm, line=>{
    const cells=line.split("|").filter((_,i,a)=>i>0&&i<a.length-1);
    return "<tr>"+cells.map(c=>`<td>${c.trim()}</td>`).join("")+"</tr>";
  });
  // Wrap consecutive tr in table
  h=h.replace(/(<tr>.*<\/tr>\n?)+/g, block=>{
    const rows=block.trim().split("\n");
    // Check if second row is separator
    if(rows.length>1&&rows[1].includes("---")){
      const header=rows[0].replace(/<td>/g,"<th>").replace(/<\/td>/g,"<\/th>");
      const body=rows.slice(2).join("\n");
      return `<div class="tbl-wrap"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
    }
    return `<div class="tbl-wrap"><table><tbody>${block}</tbody></table></div>`;
  });
  // Bold
  h=h.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  // Line breaks
  h=h.replace(/\n/g,"<br>");
  return h;
}

// ── TOOL EXECUTION ────────────────────────────────────────────────────────────
async function executeTool(name, args){
  if(name==="fetch_mlb_events"){
    return await toolFetchEvents();
  }
  if(name==="fetch_hr_odds"){
    return await toolFetchOdds(args.event_id, args.game_label);
  }
  return {error:"Unknown tool: "+name};
}

async function toolFetchEvents(){
  if(mlbEventCache && mlbEventCache.ts > Date.now()-300000){
    addToolMsg("fetch_mlb_events","returning cached slate ("+mlbEventCache.events.length+" games)");
    return {events:mlbEventCache.events, cached:true};
  }
  addToolMsg("fetch_mlb_events","fetching today's MLB slate…");
  try{
    const res=await fetch(`${ODDS_BASE}/sports/baseball_mlb/events?apiKey=${oddsKey}&dateFormat=iso`);
    if(!res.ok){const e=await res.json();return {error:e.message||"Events fetch failed "+res.status};}
    const data=await res.json();
    const now=new Date();
    const events=data
      .filter(e=>new Date(e.commence_time)>new Date(now.getTime()-3*3600000))
      .sort((a,b)=>new Date(a.commence_time)-new Date(b.commence_time))
      .map(e=>({
        id:e.id,
        home_team:e.home_team,
        away_team:e.away_team,
        commence_time:e.commence_time,
        game_label:`${e.away_team} vs ${e.home_team}`
      }));
    mlbEventCache={events, ts:Date.now()};
    addToolMsg("fetch_mlb_events",`returned ${events.length} games`);
    return {events, retrieved_at:new Date().toISOString()};
  }catch(e){return {error:e.message};}
}

async function toolFetchOdds(eventId, gameLabel){
  addToolMsg("fetch_hr_odds","querying 5 books for "+gameLabel+"…");
  try{
    const url=`${ODDS_BASE}/sports/baseball_mlb/events/${eventId}/odds?apiKey=${oddsKey}&regions=us&markets=batter_home_runs&oddsFormat=american&bookmakers=${BOOKS.join(",")}`;
    const res=await fetch(url);
    if(!res.ok){const e=await res.json();return {error:e.message||"Odds fetch failed "+res.status};}
    const data=await res.json();
    const remaining=res.headers.get("x-requests-remaining");

    const playerMap={};
    for(const bm of (data.bookmakers||[])){
      for(const mkt of (bm.markets||[])){
        if(mkt.key!=="batter_home_runs") continue;
        for(const o of (mkt.outcomes||[])){
          const nm=o.name, odds=o.price;
          if(!playerMap[nm]) playerMap[nm]={name:nm, bestOdds:-Infinity, bestBook:"", allBooks:{}};
          playerMap[nm].allBooks[BOOK_LABELS[bm.key]||bm.key]=odds;
          const bookPri=BOOKS.indexOf(bm.key);
          const curPri=BOOKS.indexOf(Object.keys(BOOK_LABELS).find(k=>BOOK_LABELS[k]===playerMap[nm].bestBook)||"");
          if(odds>playerMap[nm].bestOdds||(odds===playerMap[nm].bestOdds&&bookPri<curPri)){
            playerMap[nm].bestOdds=odds;
            playerMap[nm].bestBook=BOOK_LABELS[bm.key]||bm.key;
          }
        }
      }
    }

    const players=Object.values(playerMap)
      .filter(p=>p.bestOdds>=threshold)
      .sort((a,b)=>b.bestOdds-a.bestOdds);

    const ts=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    addToolMsg("fetch_hr_odds",`${players.length} players at or above +${threshold} | ${remaining||"?"} calls remaining`);
    return {game:gameLabel, players, threshold_applied:threshold, retrieved_at:ts, api_calls_remaining:remaining};
  }catch(e){return {error:e.message};}
}

// ── GEMINI API ────────────────────────────────────────────────────────────────
async function callGemini(userMessage){
  history.push({role:"user",parts:[{text:userMessage}]});

  const body={
    systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},
    contents:history,
    tools:TOOLS,
    generationConfig:{
      temperature:1.0,
      maxOutputTokens:8192,
      thinkingConfig:{thinkingBudget:8000}
    }
  };

  const res=await fetch(
    `${GEMINI_BASE}/models/${MODEL}:generateContent?key=${geminiKey}`,
    {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}
  );

  if(!res.ok){
    const e=await res.json();
    throw new Error(e.error?.message||"Gemini API error "+res.status);
  }
  return await res.json();
}

// ── AGENTIC LOOP ──────────────────────────────────────────────────────────────
async function agentLoop(userMessage){
  isLoading=true;
  document.getElementById("send-btn").disabled=true;
  addMsg("user",userMessage);

  let typing=showTyping();
  let response;

  try{
    response=await callGemini(userMessage);
  }catch(e){
    removeTyping();
    addMsg("err-msg","API Error: "+e.message);
    isLoading=false;
    document.getElementById("send-btn").disabled=false;
    return;
  }

  // Agentic loop: keep processing until no more function calls
  while(true){
    const candidate=response.candidates?.[0];
    if(!candidate){
      removeTyping();
      addMsg("err-msg","No response from model.");
      break;
    }

    const parts=candidate.content?.parts||[];
    const funcCalls=parts.filter(p=>p.functionCall);
    const textParts=parts.filter(p=>p.text&&p.text.trim());

    // Add assistant turn to history
    history.push({role:"model",parts});

    // If there are text parts, show them
    if(textParts.length){
      removeTyping();
      const fullText=textParts.map(p=>p.text).join("\n").trim();
      if(fullText) addMsg("ai",fullText);
      detectPhase(fullText);
    }

    // If no function calls, we're done
    if(!funcCalls.length) break;

    // Execute all function calls
    const toolResults=[];
    for(const part of funcCalls){
      const fc=part.functionCall;
      try{
        const result=await executeTool(fc.name, fc.args||{});
        toolResults.push({
          functionResponse:{
            name:fc.name,
            response:{name:fc.name, content:result}
          }
        });
      }catch(e){
        toolResults.push({
          functionResponse:{
            name:fc.name,
            response:{name:fc.name, content:{error:e.message}}
          }
        });
      }
    }

    // Add tool results to history and call again
    history.push({role:"user",parts:toolResults});
    typing=showTyping();
    try{
      response=await callGemini(null);
      // Note: for tool result turns, callGemini with null just sends the already-updated history
      // We need to call without adding a new user message
      const body2={
        systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},
        contents:history,
        tools:TOOLS,
        generationConfig:{temperature:1.0,maxOutputTokens:8192,thinkingConfig:{thinkingBudget:8000}}
      };
      const res2=await fetch(
        `${GEMINI_BASE}/models/${MODEL}:generateContent?key=${geminiKey}`,
        {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body2)}
      );
      removeTyping();
      if(!res2.ok){const e=await res2.json();throw new Error(e.error?.message||"Gemini error");}
      response=await res2.json();
    }catch(e){
      removeTyping();
      addMsg("err-msg","API Error: "+e.message);
      break;
    }
  }

  // Fix: if history has duplicate last user entry from null call, clean up
  isLoading=false;
  document.getElementById("send-btn").disabled=false;
  document.getElementById("user-input").focus();
}

// Smarter version that avoids double-posting
async function sendMessage(){
  const ta=document.getElementById("user-input");
  const msg=ta.value.trim();
  if(!msg||isLoading) return;
  ta.value=""; autoResize(ta);
  await runAgentLoop(msg);
}

async function runAgentLoop(userMessage){
  isLoading=true;
  document.getElementById("send-btn").disabled=true;

  if(userMessage!==null){
    addMsg("user",userMessage);
    history.push({role:"user",parts:[{text:userMessage}]});
  }

  let typing=showTyping();

  while(true){
    const body={
      systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},
      contents:history,
      tools:TOOLS,
      generationConfig:{temperature:1.0,maxOutputTokens:8192}
    };

    let response;
    try{
      const res=await fetch(
        `${GEMINI_BASE}/models/${MODEL}:generateContent?key=${geminiKey}`,
        {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}
      );
      if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"Gemini API error "+res.status);}
      response=await res.json();
    }catch(e){
      removeTyping();
      addMsg("err-msg","API Error: "+e.message+"\n\nCheck your Gemini API key (⚙ KEYS button).");
      isLoading=false;
      document.getElementById("send-btn").disabled=false;
      return;
    }

    const candidate=response.candidates?.[0];
    if(!candidate){removeTyping();addMsg("err-msg","Empty response.");break;}

    const parts=candidate.content?.parts||[];
    const funcCalls=parts.filter(p=>p.functionCall);
    const textParts=parts.filter(p=>p.text&&p.text.trim());

    history.push({role:"model",parts});

    if(textParts.length){
      removeTyping();
      typing=null;
      const txt=textParts.map(p=>p.text).join("\n").trim();
      if(txt){addMsg("ai",txt);detectPhase(txt);}
    }

    if(!funcCalls.length) break;

    const toolResultParts=[];
    for(const part of funcCalls){
      const fc=part.functionCall;
      let result;
      try{ result=await executeTool(fc.name,fc.args||{}); }
      catch(e){ result={error:e.message}; }
      toolResultParts.push({
        functionResponse:{name:fc.name,response:{name:fc.name,content:result}}
      });
    }

    history.push({role:"user",parts:toolResultParts});
    if(!typing) typing=showTyping();
  }

  if(typing) removeTyping();
  isLoading=false;
  document.getElementById("send-btn").disabled=false;
  document.getElementById("user-input").focus();
}

function detectPhase(text){
  if(!text) return;
  if(text.includes("PHASE 0 COMPLETE")) setPhase(0);
  else if(text.includes("PHASE 1 COMPLETE")) setPhase(1);
  else if(text.includes("PHASE 2 COMPLETE")) setPhase(2);
  else if(text.includes("PHASE 3 COMPLETE")) setPhase(3);
  else if(text.includes("ANALYSIS COMPLETE")) setPhase(4);
}

function handleKey(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}
}
function autoResize(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,100)+"px";}
